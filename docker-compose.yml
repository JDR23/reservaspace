services:

  db:
    image: postgres:15
    container_name: reservaspace_db
    restart: always
    environment:
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - reservaspace_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: reservaspace_backend
    restart: always
    environment:
      DATABASE_URL:                ${DATABASE_URL}
      SECRET_KEY:                  ${SECRET_KEY}
      ALGORITHM:                   ${ALGORITHM}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES}
      APP_NAME:                    ${APP_NAME}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - reservaspace_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: reservaspace_frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - reservaspace_net

volumes:
  postgres_data:

networks:
  reservaspace_net:
    driver: bridge
