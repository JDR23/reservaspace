<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ReservaSpace — Iniciar Sesión</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body class="login-page">

  <div class="login-container">
    <div class="login-logo">
      <h1>🏛️ ReservaSpace</h1>
      <p>Gestión de espacios institucionales</p>
    </div>

    <form id="loginForm" class="login-form">
      <h2>Iniciar Sesión</h2>

      <div class="form-group">
        <label for="correo">Correo electrónico</label>
        <input type="email" id="correo" placeholder="correo@ejemplo.com" required />
      </div>

      <div class="form-group">
        <label for="contrasena">Contraseña</label>
        <input type="password" id="contrasena" placeholder="••••••••" required />
      </div>

      <div id="mensajeError" class="mensaje error oculto"></div>

      <button type="submit" class="btn-primary" id="btnLogin">
        Ingresar
      </button>
    </form>
  </div>

  <script src="js/auth.js"></script>

  <footer class="login-footer">
    <p>ReservaSpace &copy; 2025 &mdash; Felipe Antury &amp; Juan David Restrepo</p>
    <p>Tecnologia en Desarrollo de Software</p>
  </footer>
</body>
</html>
